name: Go CI

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod

            - name: Run tests
              run: go test ./...
    format-and-lint:
        name: Format & Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod

            - name: Check formatting
              run: test -z "$(gofmt -l .)"

            - name: Run go vet
              run: go vet ./...
